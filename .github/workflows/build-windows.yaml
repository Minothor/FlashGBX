name: Windows

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.release.tag_name || '0.0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          New-Item -ItemType Directory -Force -Path cache | Out-Null
          New-Item -ItemType Directory -Force -Path embedded-python | Out-Null

      - name: Cache prerequisites
        id: cache-prerequisites
        uses: actions/cache@v4
        with:
          path: |
            cache
          key: flashgbx-windows-x64-prerequisites-20260210
          restore-keys: |
            flashgbx-windows-x64-prerequisites-

      - name: Get TDM-GCC 9.2.0
        if: steps.cache-prerequisites.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/jmeubank/tdm-gcc/releases/download/v9.2.0-tdm64-1/tdm64-gcc-9.2.0.exe"
          Invoke-WebRequest $url -OutFile tdm-gcc.zip
          & "C:\Program Files\7-Zip\7z.exe" e tdm-gcc.zip -ocache\tdm-gcc -y
          & "C:\Program Files\7-Zip\7z.exe" e cache\tdm-gcc\*.tar.xz -ocache\tdm-gcc -y
          & "C:\Program Files\7-Zip\7z.exe" x cache\tdm-gcc\*.tar.lzma -ocache\tdm-gcc -y
          & "C:\Program Files\7-Zip\7z.exe" x cache\tdm-gcc\*.tar -ocache\tdm-gcc -y

      - name: Download and verify CH341 driver for Setup package
        run: |
          New-Item -ItemType Directory -Force -Path ".github\build\Windows\Drivers\CH341" | Out-Null
          $url = "https://www.wch-ic.com/download/file?id=65"
          $outputPath = ".github\build\Windows\Drivers\CH341\CH341SER.EXE"
          Write-Host "Downloading CH341 driver from $url..."
          Invoke-WebRequest $url -OutFile $outputPath
          Write-Host "Verifying digital signature..."
          $signature = Get-AuthenticodeSignature $outputPath
          if ($signature.Status -ne "Valid") {
              Write-Error "Invalid digital signature on CH341.EXE!"
              Write-Error "Status: $($signature.Status)"
              if ($signature.SignerCertificate) {
                  Write-Error "Signer: $($signature.SignerCertificate.SubjectName.Name)"
              }
              exit 1
          }
          Write-Host "✓ Driver signature verified successfully"
          Write-Host "  Signer: $($signature.SignerCertificate.SubjectName.Name)"

      - name: Set up embedded Python 3.12.10
        if: steps.cache-prerequisites.outputs.cache-hit != 'true'
        run: |
          $url = "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip"
          Invoke-WebRequest $url -OutFile python.zip
          Expand-Archive python.zip -DestinationPath cache\embedded-python
          $py = Get-ChildItem cache\embedded-python -Filter python.exe -Recurse | Select-Object -First 1

          Invoke-WebRequest https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          & $py.FullName get-pip.py

          $pth = Get-ChildItem cache\embedded-python -Filter "*._pth" | Select-Object -First 1
          $newContent = @"
          python312.zip
          .
          ..
          import site
          "@
          Set-Content -Path $pth.FullName -Value $newContent -Encoding ASCII

          & $py.FullName -m pip install `
            Pillow==12.1.0 `
            PySide6==6.10.2 `
            pyserial==3.5 `
            python-dateutil==2.9.0.post0 `
            requests==2.32.5 `
            packaging==26.0 `
            --no-cache-dir

          # Remove unnecessary files
          Get-ChildItem cache\embedded-python -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force
          Get-ChildItem cache\embedded-python -Recurse -Filter "*.pyc" | Remove-Item -Force
          $folders = @(
              "cache\embedded-python\Lib\site-packages\PySide6\examples",
              "cache\embedded-python\Lib\site-packages\PySide6\include",
              "cache\embedded-python\Lib\site-packages\PySide6\typesystems",
              "cache\embedded-python\Lib\site-packages\PySide6\support",
              "cache\embedded-python\Lib\site-packages\PySide6\translations",
              "cache\embedded-python\Lib\site-packages\PySide6\resources",
              "cache\embedded-python\Lib\site-packages\PySide6\qml",
              "cache\embedded-python\Lib\site-packages\PySide6\lib",
              "cache\embedded-python\Scripts"
          )
          foreach ($folder in $folders) {
              if (Test-Path $folder) {
                  Remove-Item $folder -Recurse -Force
              }
          }
          Get-ChildItem "cache\embedded-python\Lib\site-packages\PySide6" -Recurse -Include *.exe |
            Remove-Item -Force
          $dllPatterns = @( "*WebEngine*", "*Multimedia*", "*SpatialAudio*", "*Bluetooth*", "*RemoteObjects*", "*Pdf*", "*Charts*", "*Graphs*", "*DataVisualization*", "*Location*", "*3D*", "*Quick*", "*Qml*", "*Network*", "*Designer*", "*Shader*", "*HttpServer*", "*Qt6Labs*", "*Nfc*", "*OpenGL*", "*Print*", "*Sensors*", "*avutil*", "*avcodec*", "*avformat*", "*opengl32sw*", "*assimp*" )
          foreach ($pattern in $dllPatterns) {
            Get-ChildItem "cache\embedded-python\Lib\site-packages\PySide6" -Recurse -Filter $pattern | Remove-Item -Recurse -Force
          }

      - name: Compile Launcher EXE
        run: |
          $env:PATH = "${{ github.workspace }}\cache\tdm-gcc\bin;" + $env:PATH
          Copy-Item -Path ".github\build\Windows\Launcher\*" -Destination . -Force
          mingw32-make.exe -f Makefile all

      - name: Prepare Output
        run: |
          Move-Item "launcher.exe" "output\FlashGBX.exe"
          Move-Item LICENSE output\
          Move-Item CHANGES.md output\
          Move-Item README.md output\
          Move-Item "Third Party Notices.md" output\
          Copy-Item cache\embedded-python output\Python -Recurse
          Copy-Item FlashGBX "output\FlashGBX" -Recurse
          Remove-Item "output\FlashGBX\config" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Create ZIP archive
        run: |
          & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=9 "FlashGBX-${{ env.VERSION }}_Windows-x64.zip" ".\output\*"

      - name: Configure Setup
        run: |
          $myAppVersion = "${{ env.VERSION }}"
          $myFilesDir = "output"
          $myCH341Dir = ".github\build\Windows\Drivers\CH341"
          $myOutputDir = "setup"
          mkdir $myOutputDir | Out-Null

          Move-Item ".github\build\Windows\setup.iss" "setup.iss"
          (Get-Content "setup.iss") `
            -replace "<APP_VERSION>", "$myAppVersion" `
            -replace "<FILES_DIR>", "$myFilesDir" `
            -replace "<CH341_DIR>", "$myCH341Dir" `
            -replace "<OUTPUT_DIR>", "$myOutputDir" | Set-Content "setup.iss"
          $filesToCopy = @("CHANGES.md", "README.md", "LICENSE", "Third Party Notices.md")
          foreach ($file in $filesToCopy) {
              Copy-Item "output\$file" "$myOutputDir" -Force
          }
          Rename-Item -Path "$myFilesDir\FlashGBX.exe" -NewName "FlashGBX-app.exe" -Force

      - name: Install Inno Setup 6.7.0
        run: |
          $innoSetupUrl = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_2/innosetup-6.7.2.exe"
          $installerPath = "is.exe"
          Invoke-WebRequest -Uri $innoSetupUrl -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList "/SILENT" -Wait

      - name: Create Setup archive
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup.iss"
          Move-Item "setup\Setup_FlashGBX.exe" "setup\FlashGBX-${{ env.VERSION }}_Windows-x64_Setup.exe"
          & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=3 "FlashGBX-${{ env.VERSION }}_Windows-x64_Setup.zip" ".\setup\*"

      - name: Create artifact
        if: env.VERSION == '0.0'
        uses: actions/upload-artifact@v4
        with:
          name: FlashGBX_Windows-x64
          path: "FlashGBX-${{ env.VERSION }}_Windows-x64.zip"
      - name: Create artifact (Setup)
        if: env.VERSION == '0.0'
        uses: actions/upload-artifact@v4
        with:
          name: FlashGBX_Windows-x64_Setup
          path: "FlashGBX-${{ env.VERSION }}_Windows-x64_Setup.zip"

      - name: Upload release asset
        if: env.VERSION != '0.0'
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: "FlashGBX-${{ env.VERSION }}_Windows-x64.zip"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release asset (Setup)
        if: env.VERSION != '0.0'
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: "FlashGBX-${{ env.VERSION }}_Windows-x64_Setup.zip"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
